<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ProcrastiMap</title>
  <style>
    body {
      background-color: #0D0D0D;
      color: #F5F0E8;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }
    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
      max-width: 900px;
      margin: 0 auto;
    }
    @media (min-width: 768px) {
      .layout { grid-template-columns: 1fr 1fr; align-items: start; }
    }
    .carte {
      background-color: #1A1A1A;
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
      position: relative;
      overflow: hidden;
    }
    .feed {
      background-color: #1A1A1A;
      border-radius: 20px;
      padding: 2rem;
      width: 100%;
    }
    h1 {
      color: #FFE566;
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 0.25rem;
    }
    p { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    label {
      display: block;
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    select, input {
      width: 100%;
      background-color: #252525;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: #F5F0E8;
      font-size: 0.95rem;
      margin-bottom: 1rem;
    }
    .honte { display: flex; gap: 8px; margin-bottom: 1rem; }
    .dot {
      width: 44px; height: 44px;
      background-color: #252525;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: #F5F0E8; font-weight: 700; font-size: 1rem;
    }
    .dot.active { background-color: #FFE566; color: #0D0D0D; border-color: #FFE566; }
    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 1rem 0; }
    button {
      width: 100%; background-color: #FFE566; color: #0D0D0D;
      border-radius: 999px; padding: 0.875rem 2rem; border: none;
      font-size: 1rem; font-weight: 700; cursor: pointer; margin-top: 0.5rem;
    }
    .feed h2 { font-family: 'Syne', sans-serif; color: #FFE566; font-size: 1.2rem; margin-bottom: 1rem; }
    .confession-item { background-color: #252525; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 0.75rem; }
    .confession-country { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.25rem; }
    .confession-activity { font-size: 0.95rem; color: #F5F0E8; margin-bottom: 0.5rem; }
    .confession-shame { display: flex; gap: 3px; }
    .shame-dot { width: 8px; height: 8px; border-radius: 2px; background: #FFE566; }
    .shame-dot.off { background: #444; }
    .popup-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .popup-overlay.visible { opacity: 1; pointer-events: all; }
    .popup {
      background: #1A1A1A; border-radius: 20px; padding: 2rem;
      max-width: 320px; width: 90%; text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      transform: scale(0.9); transition: transform 0.2s;
    }
    .popup-overlay.visible .popup { transform: scale(1); }
    .popup-emoji { font-size: 3rem; margin-bottom: 1rem; display: block; }
    .popup-title { font-family: 'Syne', sans-serif; font-size: 1.3rem; color: #FFE566; margin-bottom: 0.5rem; }
    .popup-sub { color: #888; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .popup-btn {
      background: #FFE566; color: #0D0D0D; border: none;
      border-radius: 999px; padding: 0.75rem 2rem;
      font-weight: 700; cursor: pointer; width: auto;
    }
    .share-btns { display: flex; gap: 8px; margin-top: 0.75rem; }
    .share-btns a {
      font-size: 0.75rem; color: #888; text-decoration: none;
      background: #333; padding: 4px 10px; border-radius: 99px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: color 0.2s, border-color 0.2s;
    }
    .share-btns a:hover { color: #FFE566; border-color: #FFE566; }
    #google_translate_element {
      background: #1A1A1A;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      padding: 8px 16px;
    }
    #google_translate_element select {
      background: transparent; color: #FFE566; border: none;
      font-size: 0.9rem; font-weight: 700; font-family: 'Syne', sans-serif;
      margin-bottom: 0; width: auto; padding: 0; cursor: pointer;
    }
    .reactions { display: flex; gap: 8px; margin-top: 0.75rem; margin-bottom: 0.5rem; }
    .reaction-btn {
      background: #252525;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 99px;
      padding: 4px 12px;
      color: #F5F0E8;
      font-size: 0.85rem;
      cursor: pointer;
      width: auto;
      margin-top: 0;
      transition: background 0.15s, border-color 0.15s;
    }
    .reaction-btn:hover { background: #333; border-color: #FFE566; }
  </style>
</head>
<body>

  <nav style="max-width: 900px; margin: 0 auto 2rem; display: flex; gap: 1rem;">
    <a href="index.html" style="font-family: 'Syne', sans-serif; font-weight: 700; color: #FFE566; text-decoration: none; font-size: 1.1rem;">🙈 Confess</a>
    <a href="world.html" style="font-family: 'Syne', sans-serif; font-weight: 700; color: #888; text-decoration: none; font-size: 1.1rem;">🌍 World</a>
  </nav>

  <div id="google_translate_element" style="position: fixed; top: 1rem; right: 1rem; z-index: 200;"></div>

  <div class="layout">
    <div class="carte">
      <h1>How have you procrastinated? 😬</h1>
      <p>Come on, we won't judge. okay, maybe a little.</p>

      <label>Country</label>
      <select>
        <option value="">-- Country --</option>
        <option>🇩🇿 Algeria</option>
        <option>🇩🇪 Germany</option>
        <option>🇦🇷 Argentina</option>
        <option>🇦🇺 Australia</option>
        <option>🇧🇪 Belgium</option>
        <option>🇧🇷 Brazil</option>
        <option>🇨🇦 Canada</option>
        <option>🇨🇳 China</option>
        <option>🇰🇷 South Korea</option>
        <option>🇪🇸 Spain</option>
        <option>🇺🇸 USA</option>
        <option>🇫🇷 France</option>
        <option>🇬🇧 United Kingdom</option>
        <option>🇮🇳 India</option>
        <option>🇮🇩 Indonesia</option>
        <option>🇮🇹 Italy</option>
        <option>🇯🇵 Japan</option>
        <option>🇲🇦 Morocco</option>
        <option>🇲🇽 Mexico</option>
        <option>🇳🇬 Nigeria</option>
        <option>🇳🇴 Norway</option>
        <option>🇳🇿 New Zealand</option>
        <option>🇵🇰 Pakistan</option>
        <option>🇳🇱 Netherlands</option>
        <option>🇵🇭 Philippines</option>
        <option>🇵🇹 Portugal</option>
        <option>🇸🇪 Sweden</option>
        <option>🇨🇭 Switzerland</option>
        <option>🇹🇷 Turkey</option>
        <option>🇺🇦 Ukraine</option>
        <option>🇻🇳 Vietnam</option>
      </select>

      <label>What you were actually doing</label>
      <input type="text" placeholder="ex: watched kitten videos for 2 hours..."/>

      <label>Shame level</label>
      <div class="honte">
        <div class="dot" onclick="setHonte(1)">1</div>
        <div class="dot" onclick="setHonte(2)">2</div>
        <div class="dot" onclick="setHonte(3)">3</div>
        <div class="dot" onclick="setHonte(4)">4</div>
        <div class="dot" onclick="setHonte(5)">5</div>
      </div>

      <hr class="divider">
      <button onclick="confess()">Confess your procrastination 🙈</button>
    </div>

    <div class="feed">
      <h2>Latest confessions 🌍</h2>
      <div id="confessions-list">Loading...</div>
    </div>
  </div>

  <div class="popup-overlay" id="popup">
    <div class="popup">
      <span class="popup-emoji">🙈</span>
      <div class="popup-title">Confession logged!</div>
      <div class="popup-sub">The world now knows. No going back.</div>
      <button class="popup-btn" onclick="closePopup()">Own it 😤</button>
    </div>
  </div>

  <div id="pile-wrapper" style="position: fixed; bottom: 0; right: 0; pointer-events: none; z-index: 50;">
    <div id="pile-counter" style="font-family: 'Syne', sans-serif; font-size: 0.75rem; color: #FFE566; text-align: center; opacity: 0.7; padding: 4px 8px;"></div>
    <canvas id="pile-canvas" width="140" height="160" style="display:block;"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        { pageLanguage: 'en', layout: google.translate.TranslateElement.InlineLayout.SIMPLE },
        'google_translate_element'
      );
    }

    const { createClient } = supabase;
    const db = createClient(
      'https://mdxgznjcokuxjdkzbias.supabase.co',
      'sb_publishable_gNg5Ac1Ff6FDILMl8lXPFw_KRmMUQGR'
    );

    let shameLevel = 0;

    const messages = [
      { emoji: '🙈', title: 'Confession logged!', sub: 'The world now knows. No going back.' },
      { emoji: '😳', title: 'Oh wow. Really?', sub: 'That\'s a new low. We respect it.' },
      { emoji: '💀', title: 'This one is bad.', sub: 'Like... really bad. We\'re judging you.' },
      { emoji: '😂', title: 'Classic.', sub: 'You\'re not alone. Unfortunately.' },
      { emoji: '🏆', title: 'Procrastinator of the day?', sub: 'This might be peak laziness. Congrats.' },
    ];

    function updatePile(n) {
      document.getElementById('pile-counter').textContent = n + ' confessions 🌍';
      const canvas = document.getElementById('pile-canvas');
      const ctx = canvas.getContext('2d');
      const W = 140, H = 160;
      ctx.clearRect(0, 0, W, H);
      const nb = Math.min(Math.ceil(n / 3), 22);
      if (nb === 0) return;
      const shades = [
        { face: '#E8EDF2', side: '#B8C4D0', top: '#D0D8E4', lines: 'rgba(100,120,150,0.25)' },
        { face: '#EDF0F5', side: '#BEC8D5', top: '#D5DCE8', lines: 'rgba(100,120,150,0.2)'  },
        { face: '#E2E8EE', side: '#B2BECE', top: '#CAD4E0', lines: 'rgba(100,120,150,0.3)'  },
        { face: '#EFF2F7', side: '#C2CCDA', top: '#D8E0EC', lines: 'rgba(100,120,150,0.18)' },
      ];
      function seededRand(i, o) {
        return ((Math.sin(i * 9.301 + o * 49.583) * 43758.5453) % 1 + 1) % 1;
      }
      function drawSheet(x, y, w, h, tilt, shade) {
        ctx.save();
        ctx.translate(x + w/2, y + h/2);
        ctx.rotate(tilt);
        const bw = w * 0.12;
        const tw = w - bw;
        const th = h;
        ctx.fillStyle = shade.side;
        ctx.beginPath();
        ctx.moveTo(-w/2 + tw, -th/2);
        ctx.lineTo(-w/2 + tw + bw, -th/2 + 3);
        ctx.lineTo(-w/2 + tw + bw,  th/2 + 3);
        ctx.lineTo(-w/2 + tw,       th/2);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = shade.top;
        ctx.beginPath();
        ctx.moveTo(-w/2,      -th/2);
        ctx.lineTo(-w/2 + tw, -th/2);
        ctx.lineTo(-w/2 + tw + bw, -th/2 + 3);
        ctx.lineTo(-w/2 + bw, -th/2 + 3);
        ctx.closePath();
        ctx.fill();
        ctx.fillStyle = shade.face;
        ctx.fillRect(-w/2, -th/2 + 3, tw, th - 3);
        ctx.fillStyle = shade.lines;
        for (let i = 0; i < 3; i++) {
          const ly = -th/2 + 3 + (th * 0.25) + i * (th * 0.18);
          const lw = tw * (0.5 + seededRand(i, 7) * 0.3);
          ctx.fillRect(-w/2 + tw * 0.1, ly, lw, 1.5);
        }
        ctx.restore();
      }
      const baseW = 130, sheetH = 9, gap = 1;
      const baseY = H - 10, cx = W / 2;
      for (let i = 0; i < nb; i++) {
        const tilt = (seededRand(i, 3) - 0.5) * 0.08;
        const xOff = (seededRand(i, 4) - 0.5) * 12;
        const w = baseW - seededRand(i, 5) * 20;
        const y = baseY - i * (sheetH + gap);
        drawSheet(cx + xOff - w/2, y - sheetH, w, sheetH, tilt, shades[i % shades.length]);
      }
    }

    function setHonte(niveau) {
      shameLevel = niveau;
      document.querySelectorAll('.dot').forEach((dot, index) => {
        dot.classList.toggle('active', index < niveau);
      });
    }

    function closePopup() {
      document.getElementById('popup').classList.remove('visible');
    }

    async function vote(confessionId, emoji) {
      const { error } = await db
        .from('votes')
        .insert({ confession_id: confessionId, emoji });
      if (error) { console.error(error); return; }
      const el = document.getElementById(emoji + '-' + confessionId);
      if (el) el.textContent = parseInt(el.textContent) + 1;
    }

    async function confess() {
      const country = document.querySelector('select').value;
      const activity = document.querySelector('input').value;
      if (!country || !activity || !shameLevel) {
        alert('Fill in all fields and pick a shame level! 😅');
        return;
      }
      const { error } = await db
        .from('procrastinations')
        .insert({ country, activity, shame_level: shameLevel });
      if (error) {
        alert('Something went wrong 😬');
        console.error(error);
      } else {
        const msg = messages[Math.floor(Math.random() * messages.length)];
        document.querySelector('.popup-emoji').textContent = msg.emoji;
        document.querySelector('.popup-title').textContent = msg.title;
        document.querySelector('.popup-sub').textContent = msg.sub;
        document.getElementById('popup').classList.add('visible');
        document.querySelector('select').value = '';
        document.querySelector('input').value = '';
        setHonte(0);
        loadConfessions();
      }
    }

    async function loadConfessions() {
      const { data, error } = await db
        .from('procrastinations')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(20);
      if (error) { console.error(error); return; }
      updatePile(data.length);
      const { data: votes } = await db.from('votes').select('*');
      const list = document.getElementById('confessions-list');
      list.innerHTML = data.map(c => {
        const lol = votes.filter(v => v.confession_id === c.id && v.emoji === 'lol').length;
        const noway = votes.filter(v => v.confession_id === c.id && v.emoji === 'noway').length;
        const relatable = votes.filter(v => v.confession_id === c.id && v.emoji === 'relatable').length;
        return `
          <div class="confession-item">
            <div class="confession-country">${c.country}</div>
            <div class="confession-activity">${c.activity}</div>
            <div class="confession-shame">
              ${[1,2,3,4,5].map(i =>
                `<div class="shame-dot${i > c.shame_level ? ' off' : ''}"></div>`
              ).join('')}
            </div>
            <div class="reactions">
              <button class="reaction-btn" onclick="vote('${c.id}', 'lol')">😂 <span id="lol-${c.id}">${lol}</span></button>
              <button class="reaction-btn" onclick="vote('${c.id}', 'noway')">😱 <span id="noway-${c.id}">${noway}</span></button>
              <button class="reaction-btn" onclick="vote('${c.id}', 'relatable')">😳 <span id="relatable-${c.id}">${relatable}</span></button>
            </div>
            <div class="share-btns">
              <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent('I just procrastinated: ' + c.activity + ' 🙈 procrastimap.vercel.app')}" target="_blank">𝕏</a>
              <a href="https://wa.me/?text=${encodeURIComponent('I confessed my procrastination 🙈 ' + c.activity + ' - procrastimap.vercel.app')}" target="_blank">WhatsApp</a>
              <a href="https://www.facebook.com/sharer/sharer.php?u=https://procrastimap.vercel.app" target="_blank">Facebook</a>
            </div>
          </div>
        `;
      }).join('');
    }

    loadConfessions();
  </script>
</body>
</html>
